name: Flights Update

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 10 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all Sofia arrivals
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then echo "No API_KEY"; exit 0; fi
          TODAY=$(date -u +%Y-%m-%d)
          curl -sf "http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&arr_iata=SOF&flight_date=${TODAY}&limit=100&offset=0" -o page1.json || echo "{}" > page1.json
          curl -sf "http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&arr_iata=SOF&flight_date=${TODAY}&limit=100&offset=100" -o page2.json || echo "{}" > page2.json
          python3 .github/merge_flights.py

      - name: Sync to BAK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/sync_bak.py

      - name: Commit
        run: |
          git config user.name "FlightBot"
          git config user.email "bot@github.com"
          git add flight-cache.json
          git diff --cached --quiet || git commit -m "flights: $(date -u +%Y-%m-%dT%H:%M)"
          git push
