name: Flights Update

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 10 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Sofia arrivals
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python3 .github/merge_flights.py

      - name: Sync to BAK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/sync_bak.py

      - name: Commit
        run: |
          git config user.name "FlightBot"
          git config user.email "bot@github.com"
          git add flight-cache.json
          git diff --cached --quiet || git commit -m "flights: $(date -u +%Y-%m-%dT%H:%M)"
          git push
