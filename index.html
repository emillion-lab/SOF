<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Taxi Demand Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg:      #070d1a;
  --surface: #0d1929;
  --border:  #182d47;
  --amber:   #f59e0b;
  --cyan:    #00e5ff;
  --green:   #22c55e;
  --red:     #ef4444;
  --orange:  #f97316;
  --muted:   #4a6080;
  --text:    #c8daf0;
  --mono:    'Share Tech Mono', monospace;
  --sans:    'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.header h1 { font-family: var(--mono); font-size: 17px; color: var(--cyan); letter-spacing: 2px; }
.header p  { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.live-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: blink 1.4s infinite; margin-left: auto; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* TIME SLIDER */
.time-bar {
  background: var(--surface);
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.time-label { font-family: var(--mono); font-size: 13px; color: var(--cyan); margin-bottom: 8px; }
.slider-wrap { position: relative; }
input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 6px; border-radius: 3px;
  background: linear-gradient(to right, var(--cyan) var(--pct,50%), var(--border) var(--pct,50%));
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,.5); cursor: pointer;
}
.hour-ticks { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }

/* LAYOUT */
.main { display: flex; flex-direction: column; }
@media(min-width:700px){ .main { flex-direction: row; } }

/* MAP PANEL */
.map-panel { flex: 1; position: relative; min-height: 340px; background: #08111f; }
#svg-map { width: 100%; height: 100%; display: block; }

/* tooltip */
.tooltip {
  position: fixed; display: none;
  background: #0e1829ee; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--text); z-index: 100;
  pointer-events: none; max-width: 220px;
}
.tooltip strong { font-family: var(--mono); color: var(--cyan); font-size: 13px; }
.tooltip .score-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.tooltip .score-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.tooltip .score-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* SIDEBAR */
.sidebar {
  width: 100%; background: var(--surface); border-top: 1px solid var(--border);
  overflow-y: auto; max-height: 50vh;
}
@media(min-width:700px){ .sidebar { width: 280px; border-top: none; border-left: 1px solid var(--border); max-height: none; } }

.sidebar-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); padding: 14px 14px 8px; text-transform: uppercase; }

.zone-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid #111e30;
  cursor: pointer; transition: background .15s;
}
.zone-item:hover { background: #111e30; }
.zone-item.active { background: #0c1f38; }
.zone-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.zone-name { font-size: 12px; flex: 1; }
.zone-score { font-family: var(--mono); font-size: 13px; font-weight: bold; }
.zone-reason { font-size: 10px; color: var(--muted); }

/* EVENTS TICKER */
.events-panel {
  background: #06101c;
  border-top: 1px solid var(--border);
  padding: 10px 18px;
  overflow: hidden; height: 38px;
}
.ticker-wrap { display: flex; gap: 40px; animation: ticker 35s linear infinite; width: max-content; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.tick-item { font-family: var(--mono); font-size: 11px; white-space: nowrap; }
.tick-item .ev-time { color: var(--amber); }
.tick-item .ev-name { color: var(--text); }
.tick-item .ev-loc  { color: var(--muted); }

/* LEGEND */
.legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  padding: 10px 18px;
  background: var(--surface); border-top: 1px solid var(--border);
  font-size: 10px; color: var(--muted);
}
.leg { display: flex; align-items: center; gap: 5px; }
.leg-sq { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>

<script>
// ─── ZONE DEFINITIONS ───
const ZONES = {
  center:          { name: "Център",              icon:"⭐", type:"mixed" },
  ndk:             { name: "НДК / бул.Витоша",    icon:"🎭", type:"venue" },
  arena:           { name: "Арена 8888",           icon:"🎸", type:"concert" },
  serdika:         { name: "Мол Сердика",          icon:"🛍", type:"mall" },
  paradise:        { name: "Paradise Center",      icon:"🛍", type:"mall" },
  mall_sofia:      { name: "Mall of Sofia",        icon:"🛍", type:"mall" },
  central_station: { name: "Централна гара (ЖП)",  icon:"🚂", type:"transit" },
  bus_south:       { name: "Автогара Юг",          icon:"🚌", type:"transit" },
  bus_pod:         { name: "Автогара Подуяне",     icon:"🚌", type:"transit" },
  airport:         { name: "Летище София (СОФ)",   icon:"✈️", type:"airport" },
  mladost:         { name: "Младост / Biz Park",   icon:"🏢", type:"office" },
  lozenets:        { name: "Лозенец / Водна кула", icon:"🎨", type:"venue" },
  vitosha:         { name: "Витоша (Симеоново)",   icon:"🏔", type:"leisure" },
  krasno:          { name: "Красно село",          icon:"🏘", type:"residential" },
  iztok:           { name: "Изток / Докторски",    icon:"🏡", type:"residential" },
};

// ─── EVENTS with end-times triggering taxi demand ───
// Format: { zone, name, endHour (decimal), demand multiplier, days (0=sun..6=sat, null=daily) }
const EVENTS = [
  // Concerts / Major events
  { zone:"arena",   name:"SCORPIONS – Coming Home 60г.", endHour:22.5, boost:3.5, date:"2026-06-27" },
  { zone:"ndk",     name:"Вагнеров фестивал – Опера",    endHour:22,   boost:2.5, repeat:"daily", endDate:"2026-06-14" },
  { zone:"lozenets",name:"Water Tower Art Fest",          endHour:21,   boost:1.5, repeat:"daily", endDate:"2026-06-30" },

  // Regular concerts / театър
  { zone:"ndk",     name:"Театър 199 – вечерна програма", endHour:22, boost:2.0, repeat:"thu-sat" },
  { zone:"center",  name:"Народен театър – спектакъл",    endHour:22, boost:1.8, repeat:"tue-sat" },
  { zone:"ndk",     name:"Национален дворец на културата – концерт", endHour:22, boost:2.2, repeat:"fri-sat" },

  // Malls – checkout peaks (следобед)
  { zone:"serdika",  name:"Мол Сердика – пиков изход", endHour:20.5, boost:2.0, repeat:"daily" },
  { zone:"paradise", name:"Paradise Center – изход",   endHour:21.5, boost:2.2, repeat:"daily" },
  { zone:"mall_sofia",name:"Mall of Sofia – изход",    endHour:21,   boost:1.8, repeat:"daily" },

  // Hotels checkout (12:00 window – not applicable here, but late checkout/ restaurant guests)
  { zone:"center",  name:"Хотели Център – ресторанти/бар", endHour:23, boost:1.6, repeat:"daily" },

  // Transit
  { zone:"central_station", name:"Влак София–Варна пристигане", endHour:18.5, boost:2.2, repeat:"daily" },
  { zone:"central_station", name:"Влак София–Пловдив пристигане", endHour:20,  boost:1.8, repeat:"daily" },
  { zone:"bus_south",       name:"Автобуси от Пловдив/Пазарджик", endHour:19.5, boost:2.0, repeat:"daily" },
  { zone:"bus_south",       name:"Нощни автобуси – изход",        endHour:22,   boost:1.5, repeat:"daily" },
  { zone:"bus_pod",         name:"Автогара Подуяне – разписание", endHour:18,   boost:1.6, repeat:"daily" },

  // Business / Office
  { zone:"mladost", name:"Business Park Sofia – край работа", endHour:19, boost:2.5, repeat:"mon-fri" },
  { zone:"iztok",   name:"Офис зона Изток – изход",           endHour:18.5, boost:1.6, repeat:"mon-fri" },
  { zone:"center",  name:"Офиси Център – изход",              endHour:18,  boost:1.8, repeat:"mon-fri" },

  // Airport events are injected at runtime from flight-cache.json via loadFlights()
];

// ─── BASE demand per zone (without events) ───
const BASE = {
  center: 1.2, ndk: 0.8, arena: 0.3, serdika: 0.9, paradise: 0.8,
  mall_sofia: 0.7, central_station: 1.0, bus_south: 0.8, bus_pod: 0.6,
  mladost: 0.9, lozenets: 0.6, vitosha: 0.5, krasno: 0.6, iztok: 0.7,
  airport: 1.4,
};

// ─── Score color ───
function demandColor(score) {
  if (score >= 3.0) return { fill:"#ef4444", stroke:"#ff6666", label:"ПИК 🔥", cls:"col-red" };
  if (score >= 2.2) return { fill:"#f97316", stroke:"#ffaa55", label:"Висок ▲", cls:"col-orange" };
  if (score >= 1.5) return { fill:"#f59e0b", stroke:"#ffd060", label:"Среден", cls:"col-amber" };
  if (score >= 0.8) return { fill:"#22c55e", stroke:"#55ff88", label:"Нормален", cls:"col-green" };
  return { fill:"#1a3050", stroke:"#2a4870", label:"Тих", cls:"col-muted" };
}

// ─── Today's check ───
const TODAY = new Date();
const todayStr = TODAY.toISOString().slice(0,10);
const todayDay = TODAY.getDay(); // 0=sun,6=sat

function dayMatches(ev) {
  if (ev.date && ev.date !== todayStr) return false;
  if (ev.endDate && todayStr > ev.endDate) return false;
  if (ev.repeat === "daily") return true;
  if (ev.repeat === "mon-fri") return todayDay >= 1 && todayDay <= 5;
  if (ev.repeat === "thu-sat") return [4,5,6].includes(todayDay);
  if (ev.repeat === "fri-sat") return [5,6].includes(todayDay);
  if (ev.repeat === "tue-sat") return todayDay >= 2 && todayDay <= 6;
  return true;
}

// ─── Compute scores for a given hour ───
// Peak demand window: ±1h from event end
function computeScores(hour) {
  const scores = {};
  const activeEvents = {};

  for (const zid in ZONES) {
    scores[zid] = BASE[zid] || 0.5;
    activeEvents[zid] = [];
  }

  for (const ev of EVENTS) {
    if (!dayMatches(ev)) continue;
    const diff = hour - ev.endHour; // negative = before end
    // ramp: starts building 45min before, peaks at end, fades 1.5h after
    let factor = 0;
    if (diff >= -0.75 && diff <= 0) {
      factor = (diff + 0.75) / 0.75; // ramp up
    } else if (diff > 0 && diff <= 1.5) {
      factor = 1 - diff / 1.5; // ramp down
    }
    if (factor > 0.05) {
      scores[ev.zone] += ev.boost * factor;
      activeEvents[ev.zone].push({ name: ev.name, factor: Math.round(factor*100) });
    }
  }

  return { scores, activeEvents };
}

// ─── Render ───
const shapes = document.querySelectorAll('.zone-shape');
const slider = document.getElementById('time-slider');
const timeDisplay = document.getElementById('time-display');
const zoneList = document.getElementById('zone-list');
const tooltip = document.getElementById('tooltip');

let currentHour = parseInt(slider.value);
let selectedZone = null;

// Update slider gradient
function updateSliderGradient() {
  const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.setProperty('--pct', pct + '%');
}

function render(hour) {
  const { scores, activeEvents } = computeScores(hour);

  // Update map shapes
  shapes.forEach(el => {
    const zid = el.dataset.zone;
    const s = scores[zid] || 0;
    const c = demandColor(s);
    el.style.fill = c.fill + 'cc'; // slight alpha
    el.style.stroke = c.stroke;
    el.style.strokeWidth = selectedZone === zid ? '2.5' : '1';
    el.style.opacity = selectedZone && selectedZone !== zid ? '0.6' : '1';
  });

  // Update label colors
  document.querySelectorAll('#map-labels text').forEach(t => {
    t.setAttribute('fill', '#6080a0');
  });

  // Sort zones by score descending
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);

  zoneList.innerHTML = sorted.map(([zid, score]) => {
    const z = ZONES[zid];
    const c = demandColor(score);
    const evs = activeEvents[zid];
    const evText = evs.length ? evs[0].name : '';
    return `
      <div class="zone-item ${selectedZone===zid?'active':''}" onclick="selectZone('${zid}')">
        <div class="zone-dot" style="background:${c.fill}"></div>
        <div>
          <div class="zone-name">${z.icon} ${z.name}</div>
          ${evText ? `<div class="zone-reason">${evText}</div>` : ''}
        </div>
        <div class="zone-score" style="color:${c.fill}">${score.toFixed(1)}</div>
      </div>`;
  }).join('');
}

function selectZone(zid) {
  selectedZone = selectedZone === zid ? null : zid;
  render(currentHour);
}
window.selectZone = selectZone;

// Tooltip
shapes.forEach(el => {
  el.addEventListener('mouseenter', (e) => showTooltip(e, el.dataset.zone));
  el.addEventListener('mousemove',  (e) => moveTooltip(e));
  el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  el.addEventListener('click', () => selectZone(el.dataset.zone));
});

function showTooltip(e, zid) {
  const { scores, activeEvents } = computeScores(currentHour);
  const z = ZONES[zid];
  const s = scores[zid];
  const c = demandColor(s);
  const evs = activeEvents[zid];
  const pct = Math.min(100, (s / 4) * 100);

  tooltip.innerHTML = `
    <strong>${z.icon} ${z.name}</strong>
    <div class="score-row">
      <span style="font-size:11px;color:${c.fill}">${c.label}</span>
      <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${c.fill}"></div></div>
      <span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:${c.fill}">${s.toFixed(1)}</span>
    </div>
    ${evs.length ? '<div style="margin-top:6px;font-size:10px;color:#6080a0">Активни events:</div>' + evs.slice(0,3).map(ev=>`<div style="font-size:10px;color:#c8daf0">• ${ev.name}</div>`).join('') : ''}
  `;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}

// Slider
slider.addEventListener('input', () => {
  currentHour = parseFloat(slider.value);
  const h = Math.floor(currentHour);
  const m = currentHour % 1 === 0 ? '00' : '30';
  timeDisplay.textContent = `🕔 ${String(h).padStart(2,'0')}:${m}`;
  updateSliderGradient();
  render(currentHour);
});

// ─── TICKER ───
const tickerEl = document.getElementById('ticker');
function buildTicker() {
  const items = EVENTS
    .filter(dayMatches)
    .sort((a,b) => a.endHour - b.endHour)
    .map(ev => {
      const h = Math.floor(ev.endHour);
      const m = ev.endHour % 1 === 0 ? '00' : '30';
      return `<span class="tick-item">
        <span class="ev-time">${String(h).padStart(2,'0')}:${m}</span>
        <span class="ev-name"> ${ev.name} </span>
        <span class="ev-loc">@ ${ZONES[ev.zone]?.name || ev.zone}</span>
        <span style="color:#1a3050"> ·····  </span>
      </span>`;
    });
  // duplicate for seamless loop
  const html = items.join('') + items.join('');
  tickerEl.innerHTML = html;
  tickerEl.style.animation = 'none';
  tickerEl.offsetHeight; // reflow
  tickerEl.style.animation = '';
}

// ─── AIRPORT: per-hour passenger count from flight-cache.json ───
// flightHours[h] = number of pax-ready arrivals in that hour
let flightHours = Array(24).fill(0);
let airportStatus = 'offline'; // 'live' | 'fallback' | 'offline'

function injectAirportEvents() {
  // Clear previous airport events injected from JSON
  const keep = EVENTS.filter(e => !e._fromFlight);

  // Build events from flightHours: treat each hour-bucket as one event
  // endHour = h + delay (10–20 min → 0.25h) so passengers hit the curb
  for (let h = 0; h < 24; h++) {
    const count = flightHours[h];
    if (count === 0) continue;
    // boost scales with count: 1 flight ≈ 0.4, 4 ≈ 1.6, 8+ ≈ 3.2 (capped 3.5)
    const boost = Math.min(3.5, count * 0.4);
    keep.push({
      zone: 'airport',
      name: `✈ ${count} рейс${count===1?'':'а'} пристига ~${String(h).padStart(2,'0')}:00`,
      endHour: h + 0.25, // +15min for deplaning/customs
      boost,
      repeat: 'daily',
      _fromFlight: true,
    });
  }

  // Replace EVENTS in place
  EVENTS.length = 0;
  keep.forEach(e => EVENTS.push(e));
}

function updateAirportBadge() {
  const badge = document.getElementById('airport-badge');
  if (!badge) return;
  if (airportStatus === 'live') {
    badge.textContent = '✈ LIVE';
    badge.style.color = '#22c55e';
  } else if (airportStatus === 'fallback') {
    badge.textContent = '✈ ПРОГНОЗНО';
    badge.style.color = '#f59e0b';
  } else {
    badge.textContent = '✈ ОФЛАЙН';
    badge.style.color = '#ef4444';
  }
}

function applyFallbackAirport() {
  // Статистически вълни за летище София когато JSON липсва
  airportStatus = 'fallback';
  const fallback = [
    { h: 7,  count: 3 }, { h: 9,  count: 5 }, { h: 11, count: 4 },
    { h: 13, count: 3 }, { h: 15, count: 4 }, { h: 16, count: 6 },
    { h: 18, count: 7 }, { h: 19, count: 8 }, { h: 20, count: 6 },
    { h: 21, count: 5 }, { h: 22, count: 4 }, { h: 23, count: 3 },
  ];
  fallback.forEach(({ h, count }) => { flightHours[h] = count; });
  injectAirportEvents();
}

function loadFlights() {
  fetch('flight-cache.json')
    .then(r => { if (!r.ok) throw new Error('no json'); return r.json(); })
    .then(data => {
      const flights = data.data || [];
      if (flights.length === 0) throw new Error('empty');

      flightHours = Array(24).fill(0);
      flights.forEach(f => {
        if (!f.arrival?.scheduled) return;
        const t       = new Date(f.arrival.estimated || f.arrival.scheduled);
        const origin  = (f.departure?.airport || '').toLowerCase();
        const nonEU   = origin.includes('tur') || origin.includes('israel') || origin.includes('uk');
        const delay   = nonEU ? 20 : 10;
        const ready   = new Date(t.getTime() + delay * 60000);
        flightHours[ready.getHours()]++;
      });

      airportStatus = 'live';
      injectAirportEvents();
      updateAirportBadge();
      buildTicker();
      render(currentHour);
    })
    .catch(() => {
      applyFallbackAirport();
      updateAirportBadge();
      buildTicker();
      render(currentHour);
    });
}

// ─── INIT ───
updateSliderGradient();

// Set current time automatically
const nowH = new Date().getHours();
const clampedH = Math.min(24, Math.max(14, nowH));
slider.value = clampedH;
currentHour = clampedH;
timeDisplay.textContent = `🕔 ${String(clampedH).padStart(2,'0')}:00`;
updateSliderGradient();

// First render with fallback, then try to load real flights
applyFallbackAirport();
buildTicker();
render(currentHour);
loadFlights(); // async — will re-render if JSON available
</script>
</body>
</html>
