<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>София Мастър ГИС Радар v3.1</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 10px; background-color: #090d16; color: #e2e8f0;
        }
        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #0b0f19 100%);
            color: white; padding: 12px; border-radius: 6px; margin-bottom: 10px;
            border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; color: #38bdf8; }
        header p { margin: 2px 0 0 0; opacity: 0.7; font-size: 11px; color: #94a3b8; }
        
        .layout { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 1000px) { .layout { grid-template-columns: 350px 1fr; } }
        
        .card { background: #111827; padding: 12px; border-radius: 6px; border: 1px solid #1e293b; box-sizing: border-box; }
        h3 { margin-top: 0; color: #38bdf8; border-bottom: 1px solid #1e293b; padding-bottom: 4px; font-size: 12px; text-transform: uppercase; }
        
        .field { margin-bottom: 8px; }
        label { display: block; margin-bottom: 2px; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        
        input[type="file"], input[type="text"], select {
            width: 100%; padding: 7px; border: 1px solid #334155; border-radius: 4px;
            box-sizing: border-box; font-size: 12px; background: #1f2937; color: white;
        }
        
        .btn {
            background: #2563eb; color: white; padding: 8px; border: none; border-radius: 4px;
            cursor: pointer; width: 100%; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-live { background: #ea580c; }
        .btn-live:hover { background: #ca8a04; }
        
        #map { width: 100%; height: 400px; border-radius: 6px; border: 1px solid #1e293b; margin-bottom: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
        
        .table-container { overflow-x: auto; max-height: 280px; border: 1px solid #1e293b; border-radius: 4px; background: #0f172a; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
