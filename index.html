<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sofia Taxi Demand</title>
<link rel="stylesheet" href="leaflet.min.css">
<style>@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap');
:root {
  --bg:#070d1a; --surface:#0d1929; --border:#182d47;
  --amber:#f59e0b; --cyan:#00e5ff; --green:#22c55e;
  --red:#ef4444; --orange:#f97316; --muted:#4a6080; --text:#c8daf0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* HEADER */
.header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000;}
.header h1{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);letter-spacing:2px;}
.header p{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#airport-badge{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--amber);}

/* TIMELINE */
.timeline-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 12px 5px;flex-shrink:0;}
.tl-top{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.tl-clock{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--cyan);}
.tl-sub{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-dead{font-size:9px;color:var(--red);font-family:'Share Tech Mono',monospace;display:none;}
#demand-canvas{width:100%;height:40px;display:block;cursor:pointer;min-height:40px;}
.tl-slider-wrap{margin-top:-4px;}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:transparent;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg);box-shadow:0 0 6px rgba(0,229,255,.7);cursor:pointer;}
.tl-ticks{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-top:1px;}

/* TICKER */
.ticker-bar{background:#06101c;border-bottom:1px solid var(--border);padding:0 12px;height:30px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;}
.ticker-wrap{display:flex;gap:50px;animation:ticker 280s linear infinite;width:max-content;white-space:nowrap;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{font-family:'Share Tech Mono',monospace;font-size:12px;}
.tick-item .ev-time{color:var(--amber);}
.tick-item .ev-loc{color:var(--muted);}

/* MAP — фиксирана височина вместо flex:1 за да се рендира правилно */
#map{
  height: calc(100vh - 340px);
  min-height: 220px;
  z-index:1;
  background:#08111f;
}

/* NAV PANEL (bottom sheet) */
#nav-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:#0a172af5;border-top:1px solid var(--border);
  padding:10px 14px;z-index:2000;
  display:none;flex-direction:column;gap:6px;
  backdrop-filter:blur(6px);
}
#nav-panel.open{display:flex;}
.nav-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);}
.nav-target{font-size:13px;font-weight:600;}
.nav-distance{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);}
.nav-row{display:flex;gap:8px;align-items:center;}
#nav-compass{font-size:28px;transition:transform .4s;}
.nav-hint{font-size:11px;color:var(--text);}
.nav-close{margin-left:auto;font-size:18px;cursor:pointer;color:var(--muted);padding:0 4px;}
.nav-score{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:bold;}

/* GPS button */
#gps-btn{
  position:fixed;right:12px;bottom:120px;z-index:1500;
  width:44px;height:44px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  color:var(--cyan);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
#gps-btn.active{background:#0d2a1a;border-color:var(--green);color:var(--green);}

/* Fullscreen button */
#fs-btn{
  position:fixed;right:12px;bottom:70px;z-index:1500;
  width:44px;height:44px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
#fs-btn.active{background:#0d1f38;border-color:var(--cyan);color:var(--cyan);}

/* Fullscreen map mode */
body.map-fullscreen .header,
body.map-fullscreen .timeline-panel,
body.map-fullscreen .ticker-bar { display:none !important; }
body.map-fullscreen #map { height:100vh !important; height:100dvh !important; }
body.map-fullscreen #legend { bottom:70px; }
body.map-fullscreen #gps-btn { bottom:120px; }
body.map-fullscreen #fs-btn  { bottom:70px; }

/* Pulsing user location dot */
@keyframes pulse-ring {
  0%   { transform:scale(1);   opacity:.7; }
  70%  { transform:scale(3.0); opacity:0;  }
  100% { transform:scale(3.0); opacity:0;  }
}
.user-dot-pulse {
  width:14px; height:14px; border-radius:50%;
  background:#00e5ff;
  animation:pulse-ring 3s ease-out infinite;
}

/* Traffic jam zones — pulsing purple */
@keyframes jam-blink {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:0.5; transform:scale(1.3); }
}
@keyframes jam-pulse {
  0%,100% { opacity:0.7; }
  50%      { opacity:1.0; }
}
.leaflet-interactive[data-jam="1"] {
  animation: jam-pulse 1.5s ease-in-out infinite;
}

/* ── КАРЪК MODE ── */
#karyk-btn {
  position:fixed; left:12px; top:50%; transform:translateY(-50%);
  z-index:1500; writing-mode:vertical-rl; text-orientation:mixed;
  background:#0d1929; border:1px solid #182d47;
  color:#4a6080; font-family:'Share Tech Mono',monospace;
  font-size:11px; letter-spacing:2px;
  padding:12px 6px; border-radius:6px; cursor:pointer;
  transition:all .3s; white-space:nowrap;
}
#karyk-btn.active {
  background:#1a0a2e; border-color:#a855f7;
  color:#d08dff; box-shadow:0 0 12px #a855f744;
}
#karyk-banner {
  display:none; position:fixed; top:0; left:0; right:0; z-index:3000;
  background:#0d0520f0; border-bottom:2px solid #a855f7;
  padding:8px 14px; font-family:'Share Tech Mono',monospace;
  font-size:11px; color:#d08dff; backdrop-filter:blur(6px);
}
#karyk-banner .kb-title { font-size:13px; color:#a855f7; margin-bottom:2px; }
#karyk-banner .kb-hint  { font-size:10px; color:#6040a0; }

/* ── DIRECTION ARROW overlay ── */
#direction-hint {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:#070d1af8;
  border-top:2px solid var(--amber);
  padding:10px 14px;
  z-index:1800;
  font-family:'Share Tech Mono',monospace;
}
#direction-hint .dh-row { display:flex; align-items:center; gap:12px; }
#direction-hint .dh-arrow { font-size:44px; transition:transform .4s; flex-shrink:0; line-height:1; }
#direction-hint .dh-info  { flex:1; }
#direction-hint .dh-name  { font-size:15px; color:var(--amber); font-weight:600; }
#direction-hint .dh-addr  { font-size:10px; color:var(--muted); margin-top:2px; }
#direction-hint .dh-dist  { font-size:13px; color:var(--cyan); margin-top:3px; }
#direction-hint .dh-score { font-size:26px; font-weight:bold; font-family:"Share Tech Mono",monospace; }
#direction-hint .dh-close { cursor:pointer; color:var(--muted); font-size:16px; padding:4px; }

/* ── SIDEBAR zone list ── */
#zone-sidebar {
  background:var(--surface);
  border-top:1px solid var(--border);
  max-height:32vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.sidebar-title {
  font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:1px; color:var(--muted);
  padding:8px 12px 4px; text-transform:uppercase;
  position:sticky; top:0; background:var(--surface); z-index:1;
}
.zone-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 12px; border-bottom:1px solid #0e1d30;
  cursor:pointer; transition:background .12s;
}
.zone-item:hover  { background:#111e30; }
.zone-item.active { background:#0c1f38; border-left:2px solid var(--cyan); }
.zone-dot   { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
.zone-name  { font-size:13px; flex:1; line-height:1.4; }
.zone-sub   { font-size:11px; color:var(--muted); }
.zone-score { font-family:'Share Tech Mono',monospace; font-size:15px; font-weight:bold; }

/* fullscreen hides sidebar */
body.map-fullscreen #zone-sidebar { display:none; }

/* Legend */
#legend.expanded #legend.expanded 
/* Leaflet popup override */
.leaflet-popup-content-wrapper{background:#0d1929;border:1px solid var(--border);border-radius:8px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.5);}
.leaflet-popup-tip{background:#0d1929;}
.leaflet-popup-content{margin:10px 12px;font-family:'Inter',sans-serif;font-size:12px;min-width:160px;}
.popup-title{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);margin-bottom:5px;}
.popup-score{font-size:20px;font-weight:bold;margin-bottom:3px;}
.popup-ev{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.popup-nav-btn{background:var(--cyan);color:#000;border:none;border-radius:4px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;width:100%;font-family:'Share Tech Mono',monospace;}
.popup-nav-btn:hover{background:#00c8e0;}
</style>
</head>

// HELPERS
// ═══════════════════════════════════════════════
function demandColor(score, type) {
  // Traffic jam zones get special purple "reverse direction" color
  if (type === 'traffic' && score >= 1.5)
    return {fill:"#a855f7",fillAlpha:0.50,stroke:"#d08dff",label:"🚦 ОБР.ПОСОКА!"};
  if (score>=3.2) return {fill:"#ef4444",fillAlpha:0.55,stroke:"#ff7777",label:"ПИК 🔥"};
  if (score>=2.4) return {fill:"#f97316",fillAlpha:0.50,stroke:"#ffaa55",label:"Висок ▲"};
  if (score>=1.6) return {fill:"#f59e0b",fillAlpha:0.45,stroke:"#ffd060",label:"Среден"};
  if (score>=0.8) return {fill:"#22c55e",fillAlpha:0.35,stroke:"#55ee88",label:"Нормален"};
  return {fill:"#1a3050",fillAlpha:0.30,stroke:"#2a4870",label:"Тих"};
}

const TODAY=new Date(), todayStr=TODAY.toISOString().slice(0,10), todayDay=TODAY.getDay();
function dayMatches(ev) {
  if(ev.date    && ev.date    !==todayStr)  return false;
  if(ev.endDate && todayStr   > ev.endDate) return false;
  if(ev.repeat==="daily")    return true;
  if(ev.repeat==="mon-fri")  return todayDay>=1&&todayDay<=5;
  if(ev.repeat==="thu-sat")  return [4,5,6].includes(todayDay);
  if(ev.repeat==="fri-sat")  return [5,6].includes(todayDay);
  if(ev.repeat==="tue-sat")  return todayDay>=2&&todayDay<=6;
  if(ev.repeat==="tue-sun")  return todayDay>=2||todayDay===0;
  if(ev.repeat==="wed-sat")  return todayDay>=3&&todayDay<=6;
  if(ev.repeat==="sat")      return todayDay===6;
  return true;
}

function deadZoneFactor(h) {
  if(h>=20&&h<=21){const m=20.5;return 0.42+0.58*Math.pow(Math.abs(h-m)/0.5,2);}
  return 1.0;
}

function computeScores(hour) {
  const scores={}, activeEvents={};
  ZONES.forEach(z=>{scores[z.id]=BASE[z.id]||0.5; activeEvents[z.id]=[];});
  const dz=deadZoneFactor(hour);
  for(const ev of EVENTS){
    if(!dayMatches(ev)) continue;
    const diff=hour-ev.endHour;
    let f=0;
    if(diff>=-0.75&&diff<=0) f=(diff+0.75)/0.75;
    else if(diff>0&&diff<=1.5) f=1-diff/1.5;
    if(f>0.05){
      scores[ev.zone]=(scores[ev.zone]||0)+ev.boost*f*dz;
      (activeEvents[ev.zone]=activeEvents[ev.zone]||[]).push({name:ev.name,f});
    }
  }
  if(dz<1) ZONES.forEach(z=>{if(z.id!=='airport') scores[z.id]*=(0.7+0.3*dz);});
  return{scores,activeEvents};
}

function totalDemand(hour) {
  const{scores}=computeScores(hour);
  return Object.values(scores).reduce((a,b)=>a+b,0);
}

function fmtHour(h){
  return `${String(Math.floor(h)).padStart(2,'0')}:${h%1===0.5?'30':'00'}`;
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

           style="flex:1;display:block;text-align:center;font-size:10px;color:#4a6080;font-family:'Share Tech Mono',monospace;text-decoration:none;padding:4px;background:#0d1929;border:1px solid #182d47;border-radius:4px;">

function buildCircles(){
  ZONES.forEach(z=>{
    if(z.type==='traffic'){
      const info=TRAFFIC_INFO[z.id];
      if(info){
        const marker=L.marker([z.lat,z.lng],{
          icon:makeTrafficIcon(info, false),
          zIndexOffset:600,
        }).addTo(map);
        marker.on('click',()=>showZonePopup(z.id));
        trafficMarkers[z.id]=marker;
        circleMap[z.id]=marker; // reuse circleMap slot
      }
      return;
    }
    const circle=L.circle([z.lat,z.lng],{radius:z.radius,...getScoreColor(BASE[z.id]||0.5, z.type)});
    circle.on('click',()=>showZonePopup(z.id));
    circle.addTo(map);
    circleMap[z.id]=circle;
  });
}

function updateCircles(){
  const{scores}=computeScores(currentHour);
  ZONES.forEach(z=>{
    const s=scores[z.id]||0;
    if(z.type==='traffic'){
      const info=TRAFFIC_INFO[z.id];
      const marker=trafficMarkers[z.id];
      if(marker&&info) marker.setIcon(makeTrafficIcon(info, s>=1.5));
      return;
    }
    const opts=getScoreColor(s, z.type);
    circleMap[z.id]?.setStyle(opts);
  });
}

// SPARKLINE
// ═══════════════════════════════════════════════
const canvas=document.getElementById('demand-canvas');
const ctx=canvas.getContext('2d');
const MIN_H=6,MAX_H=24,STEPS=72;
let demandCurve=[];

function buildCurve(){
  demandCurve=[];
  for(let i=0;i<=STEPS;i++) demandCurve.push(totalDemand(MIN_H+(i/STEPS)*(MAX_H-MIN_H)));
}

function drawSparkline(h){
  const dpr=window.devicePixelRatio||1;
  const W=Math.max(canvas.offsetWidth, canvas.parentElement?.offsetWidth||300);
  const H=40;
  canvas.style.width='100%';
  canvas.width=W*dpr; canvas.height=H*dpr; ctx.scale(dpr,dpr);
  const maxD=Math.max(...demandCurve),minD=Math.min(...demandCurve)*0.85;
  const xOf=i=>(i/STEPS)*W;
  const yOf=v=>H-3-((v-minD)/(maxD-minD))*(H-8);

  // Dead zone
  const x20=((20-MIN_H)/(MAX_H-MIN_H))*W;
  const x21=((21-MIN_H)/(MAX_H-MIN_H))*W;
  ctx.fillStyle='rgba(239,68,68,0.08)'; ctx.fillRect(x20,0,x21-x20,H);

  // Fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(239,68,68,0.28)');
  grad.addColorStop(0.5,'rgba(245,158,11,0.14)');
  grad.addColorStop(1,'rgba(34,197,94,0.02)');
  ctx.beginPath(); ctx.moveTo(xOf(0),yOf(demandCurve[0]));
  for(let i=1;i<=STEPS;i++) ctx.lineTo(xOf(i),yOf(demandCurve[i]));
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.beginPath(); ctx.moveTo(xOf(0),yOf(demandCurve[0]));
  for(let i=1;i<=STEPS;i++) ctx.lineTo(xOf(i),yOf(demandCurve[i]));
  ctx.strokeStyle='#f59e0b99'; ctx.lineWidth=1.5; ctx.stroke();
  // Cursor
  const cx=((h-MIN_H)/(MAX_H-MIN_H))*W;
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H);
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
  const ci=Math.round(((h-MIN_H)/(MAX_H-MIN_H))*STEPS);
  const cv=demandCurve[Math.min(ci,STEPS)];
  ctx.beginPath(); ctx.arc(cx,yOf(cv),4,0,Math.PI*2); ctx.fillStyle='#00e5ff'; ctx.fill();
}

function render(hour){
  const{scores,activeEvents}=computeScores(hour);

  document.getElementById('tl-dead').style.display=dead?'inline':'none';
  updateCircles();
  drawSparkline(hour);

  // Top hint
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0];
  const tz=ZONES.find(z=>z.id===top[0]);

    dead?'— хората са на маса или вкъщи':`Топ: ${tz?.icon||''} ${tz?.name||top[0]} (${top[1].toFixed(1)})`;

  // ── ZONE LIST SIDEBAR ──
  const zList=document.getElementById('zone-list');
  if(zList){
    zList.innerHTML=sorted.map(([zid,score])=>{
      const z=ZONES.find(x=>x.id===zid); if(!z) return '';
      const c=demandColor(score, z.type);
      const ev=(activeEvents[zid]||[]);
      const sub=ev.length?ev[0].name:'';
      return `<div class="zone-item" onclick="selectZoneFromList('${zid}')" id="li-${zid}">
        <div class="zone-dot" style="background:${c.fill}"></div>

          ${sub?`<div class="zone-sub">${sub}</div>`:''}
        </div>
        <div class="zone-score" style="color:${c.fill}">${score.toFixed(1)}</div>
      </div>`;
    }).join('');
  }

  // Update nav and direction hint
  if(navTarget&&userLat!==null) updateNavDisplay();
  if(userLat!==null) updateDirectionHint(scores);

}

// DIRECTION HINT — стрелка към близка жълта/орн зона
// ═══════════════════════════════════════════════
const ARROWS_8 = ['⬆️','↗️','➡️','↘️','⬇️','↙️','⬅️','↖️'];
const DIRS_BG  = ['С','СИ','И','ЮИ','Ю','ЮЗ','З','СЗ'];

// Address lookup cache
const addrCache = {};

async function getAddress(lat,lng){
  const key=`${lat.toFixed(4)},${lng.toFixed(4)}`;
  if(addrCache[key]) return addrCache[key];
  try{
    const url=`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=17`;
    const r=await fetch(url,{headers:{'User-Agent':'SofiaTaxiDemand/1.0'}});
    const d=await r.json();
    const road=d.address?.road||d.address?.pedestrian||'';
    const num=d.address?.house_number||'';
    const addr=road?(road+(num?' '+num:'')):'';
    addrCache[key]=addr;
    return addr;
  }catch(e){ return ''; }
}

let dirHintZid=null, dirHintSuppressed=false;

function closeDirHint(){
  dirHintSuppressed=true;
  document.getElementById('direction-hint').style.display='none';
}
window.closeDirHint=closeDirHint;

function updateDirectionHint(scores){
  if(userLat===null||dirHintSuppressed) return;
  // Find nearest zone with score >= 1.6 (yellow/orange/red)
  let best=null, bestDist=Infinity, bestScore=0;
  ZONES.forEach(z=>{
    const s=scores[z.id]||0;
    if(s<1.6) return; // only yellow+
    const d=haversine(userLat,userLng,z.lat,z.lng);
    // Weight: closer & higher score wins
    const w=d/(s*s);
    if(w<bestDist){ bestDist=w; best=z; bestScore=s; }
  });

  const panel=document.getElementById('direction-hint');
  if(!best){ panel.style.display='none'; return; }
  if(best.id===dirHintZid&&panel.style.display!=='none') return; // no flicker
  dirHintZid=best.id;

  const realDist=haversine(userLat,userLng,best.lat,best.lng);
  const bear=bearing(userLat,userLng,best.lat,best.lng);

  // Device heading correction
  let relBear=bear;
  if(deviceHeading!==null) relBear=(bear-deviceHeading+360)%360;

  const arrowIdx=Math.round(relBear/45)%8;
  const cardDir=DIRS_BG[Math.round(bear/45)%8];
  const distTxt=realDist<1000?`${Math.round(realDist)} м`:`${(realDist/1000).toFixed(1)} км`;
  const c=demandColor(bestScore);

  document.getElementById('dh-arrow').textContent=ARROWS_8[arrowIdx];
  document.getElementById('dh-name').textContent=`${best.icon} ${best.name}`;
  document.getElementById('dh-addr').textContent=`Посока ${cardDir} · ${Math.round(bear)}°`;
  document.getElementById('dh-dist').textContent=`📏 ${distTxt} от теб`;
  document.getElementById('dh-score').textContent=bestScore.toFixed(1);
  document.getElementById('dh-score').style.color=c.fill;
  panel.style.display='block';
  panel.style.borderTopColor=c.fill;

  // Special message for traffic zones
  const isJam = best.type === 'traffic';
  document.getElementById('dh-name').textContent =
    isJam ? `🚦 ${best.name} — ДВИЖИ СЕ ОБРАТНО!` : `${best.icon} ${best.name}`;
  document.getElementById('dh-name').style.color = isJam ? '#a855f7' : 'var(--amber)';

  // Draw dashed line on map (replace previous)
  if(window._dirLine) map.removeLayer(window._dirLine);
  window._dirLine=L.polyline([[userLat,userLng],[best.lat,best.lng]],{
    color:c.fill, weight:2.5, dashArray:'6,5', opacity:0.65
  }).addTo(map);

  // Fetch address async and update
  getAddress(best.lat,best.lng).then(addr=>{
    if(addr && dirHintZid===best.id){
      document.getElementById('dh-addr').textContent=
        `${addr} · ${cardDir} · ${distTxt}`;
    }
  });
}

// ═══════════════════════════════════════════════
// GPS + NAVIGATION
// ═══════════════════════════════════════════════
function deg2rad(d){return d*Math.PI/180;}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=deg2rad(lat2-lat1),dLng=deg2rad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lng1,lat2,lng2){
  const dLng=deg2rad(lng2-lng1);
  const y=Math.sin(dLng)*Math.cos(deg2rad(lat2));
  const x=Math.cos(deg2rad(lat1))*Math.sin(deg2rad(lat2))-Math.sin(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function bearingArrow(deg){
  const arrows=['⬆️','↗️','➡️','↘️','⬇️','↙️','⬅️','↖️'];
  return arrows[Math.round(deg/45)%8];
}

let deviceHeading=null;
if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientationabsolute',e=>{deviceHeading=e.alpha;},true);
  window.addEventListener('deviceorientation',e=>{if(e.webkitCompassHeading) deviceHeading=e.webkitCompassHeading;},true);
}

function startNav(zid){
  const z=ZONES.find(x=>x.id===zid);
  if(!z) return;
  navTarget=z;
  map.closePopup();
  document.getElementById('nav-panel').classList.add('open');
  document.getElementById('nav-target').textContent=`${z.icon} ${z.name}`;
  const{scores}=computeScores(currentHour);
  const s=scores[zid]||0;
  const c=demandColor(s, z?.type);
  document.getElementById('nav-score').textContent=s.toFixed(1);
  document.getElementById('nav-score').style.color=c.fill;

  if(userLat!==null) updateNavDisplay();
  else startGPS();
}
window.startNav=startNav;

function closeNav(){
  document.getElementById('nav-panel').classList.remove('open');
  navTarget=null;
}
window.closeNav=closeNav;

function updateNavDisplay(){
  if(!navTarget||userLat===null) return;
  const dist=haversine(userLat,userLng,navTarget.lat,navTarget.lng);
  const bear=bearing(userLat,userLng,navTarget.lat,navTarget.lng);
  const distTxt=dist<1000?`${Math.round(dist)} м`:`${(dist/1000).toFixed(1)} км`;
  document.getElementById('nav-dist').textContent=`📏 ${distTxt}`;

  // Relative to device heading if available
  let relBear=bear;
  if(deviceHeading!==null) relBear=(bear-deviceHeading+360)%360;
  document.getElementById('nav-compass').textContent=bearingArrow(relBear);

  const cardinals=['С','СИ','И','ЮИ','Ю','ЮЗ','З','СЗ'];
  const cardDir=cardinals[Math.round(bear/45)%8];
  document.getElementById('nav-hint').textContent=
    `Посока ${cardDir} · ${distTxt} · ${Math.round(bear)}°`;

  // Draw line on map
  if(window._navLine) map.removeLayer(window._navLine);
  window._navLine=L.polyline([[userLat,userLng],[navTarget.lat,navTarget.lng]],
    {color:'#00e5ff',weight:2,dashArray:'6,4',opacity:0.7}).addTo(map);
}

function startGPS(){
  const btn=document.getElementById('gps-btn');
  btn.classList.add('active');
  if(!navigator.geolocation){
    document.getElementById('nav-hint').textContent='GPS не е наличен';
    return;
  }
  if(watchId) return; // already watching
  watchId=navigator.geolocation.watchPosition(
    pos=>{
      userLat=pos.coords.latitude;
      userLng=pos.coords.longitude;
      // Place/update user marker
      if(!userMarker){
        const pulseIcon = L.divIcon({
          className:'',
          html:`<div style="position:relative;width:24px;height:24px;">
            <div style="position:absolute;inset:0;border-radius:50%;background:rgba(0,229,255,.25);animation:pulse-ring 3s ease-out infinite;"></div>
            <div style="position:absolute;inset:5px;border-radius:50%;background:#00e5ff;border:2px solid #fff;box-shadow:0 0 8px #00e5ff;"></div>
          </div>`,
          iconSize:[24,24], iconAnchor:[12,12],
        });
        userMarker=L.marker([userLat,userLng],{icon:pulseIcon,zIndexOffset:1000}).addTo(map);
        userMarker.bindTooltip('Вие сте тук',{permanent:false,offset:[12,0]});
        map.setView([userLat,userLng],14);
      } else {
        userMarker.setLatLng([userLat,userLng]);
      }
      if(navTarget) updateNavDisplay();
      // Auto-direction hint to nearest worthy zone
      const {scores:sc}=computeScores(currentHour);
      updateDirectionHint(sc);
    },
    err=>{
      document.getElementById('nav-hint').textContent='GPS грешка: '+err.message;
      btn.classList.remove('active');
    },
    {enableHighAccuracy:true,maximumAge:5000,timeout:15000}
  );
}

document.getElementById('gps-btn').addEventListener('click',()=>{
  if(watchId){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
    document.getElementById('gps-btn').classList.remove('active');
    if(userMarker){map.removeLayer(userMarker);userMarker=null;}
    if(window._dirLine){map.removeLayer(window._dirLine);window._dirLine=null;}
    if(window._navLine){map.removeLayer(window._navLine);window._navLine=null;}
    document.getElementById('direction-hint').style.display='none';
    userLat=null;userLng=null;
  } else {
    dirHintSuppressed=false;
    dirHintZid=null;
    // Show panel immediately with waiting message
    document.getElementById('direction-hint').style.display='block';
    document.getElementById('dh-name').textContent='🛰 Изчакай GPS…';
    document.getElementById('dh-arrow').textContent='📡';
    document.getElementById('dh-dist').textContent='Получаване на локация…';
    document.getElementById('dh-score').textContent='';
    startGPS();
  }
});

function autoNavClosestPeak(){
  if(userLat===null) return;
  const{scores}=computeScores(currentHour);
  // Find highest score within reasonable distance
  let best=null,bestScore=0;
  ZONES.forEach(z=>{
    const s=scores[z.id]||0;
    const d=haversine(userLat,userLng,z.lat,z.lng);
    if(s>=2.0&&d<8000&&s>bestScore){bestScore=s;best=z;}
  });
  if(best) startNav(best.id);
}

  const zMap={};ZONES.forEach(z=>{zMap[z.id]=z;});
  const items=EVENTS.filter(dayMatches).sort((a,b)=>a.endHour-b.endHour)
    .map(ev=>{
      const z=zMap[ev.zone];
      return`<span class="tick-item">

        <span> ${ev.name} </span>
        <span class="ev-loc">@ ${z?.name||ev.zone}</span>
        <span style="color:#0f2040"> ·· </span>
      </span>`;

  const el=document.getElementById('ticker');
  el.innerHTML=items.join('')+items.join('');
  el.style.animation='none';el.offsetHeight;el.style.animation='';
}

// AIRPORT — flight-cache.json
// ═══════════════════════════════════════════════
let flightHours=Array(24).fill(0),airportStatus='offline';

function injectAirportEvents(){
  const keep=EVENTS.filter(e=>!e._fromFlight);
  for(let h=0;h<24;h++){
    const c=flightHours[h]; if(!c) continue;
    keep.push({zone:'airport',name:`✈ ${c} рейс${c===1?'':'а'} ~${String(h).padStart(2,'0')}:00`,
      endHour:h+0.25,boost:Math.min(3.8,c*0.42),repeat:'daily',_fromFlight:true});
  }
  EVENTS.length=0;keep.forEach(e=>EVENTS.push(e));
}

function updateAirportBadge(){
  const b=document.getElementById('airport-badge');
  if(airportStatus==='live')        {b.textContent='✈ LIVE';     b.style.color='#22c55e';}
  else if(airportStatus==='fallback'){b.textContent='✈ ПРОГНОЗА';b.style.color='#f59e0b';}
  else                              {b.textContent='✈ ОФЛАЙН';  b.style.color='#ef4444';}
}

function applyFallbackAirport(){
  airportStatus='fallback';
  [[6,2],[7,4],[8,5],[9,5],[10,4],[11,4],[12,3],[13,4],[14,3],[15,4],[16,6],
   [17,5],[18,7],[19,8],[20,6],[21,5],[22,5],[23,4]].forEach(([h,c])=>{flightHours[h]=c;});
  injectAirportEvents();
}

function loadFlights(){
  fetch('flight-cache.json')
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(data=>{
      const fl=data.data||[];if(!fl.length)throw 0;
      flightHours=Array(24).fill(0);
      fl.forEach(f=>{
        if(!f.arrival?.scheduled)return;
        const t=new Date(f.arrival.estimated||f.arrival.scheduled);
        const nonEU=(f.departure?.airport||'').toLowerCase().match(/tur|israel|uk/);
        const ready=new Date(t.getTime()+(nonEU?20:10)*60000);
        flightHours[ready.getHours()]++;
      });
      airportStatus='live';
      injectAirportEvents();updateAirportBadge();buildCurve();buildTicker();render(currentHour);
    })
    .catch(()=>{applyFallbackAirport();updateAirportBadge();buildCurve();buildTicker();render(currentHour);});
}

const CACHE_KEY = 'sofia_taxi_coords_v3';
const CACHE_TTL  = 7 * 24 * 3600 * 1000; // 7 дни

async function geocodeZones() {
  // Load cache
  let cache = {};
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Date.now() - parsed.ts < CACHE_TTL) cache = parsed.coords;
    }
  } catch(e) {}

  const zMap = {};
  ZONES.forEach(z => { zMap[z.id] = z; });

  // Geocode only missing ones
  const missing = ZONES.filter(z => !cache[z.id] && NOMINATIM_QUERIES[z.id]);
  if (missing.length === 0) {
    applyGeoCache(cache, zMap);
    return;
  }

  // Show status
  const badge = document.getElementById('airport-badge');
  const origText = badge.textContent;

  let i = 0;
  for (const z of missing) {
    const q = NOMINATIM_QUERIES[z.id];
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;
      const res = await fetch(url, { headers: {'User-Agent': 'SofiaTaxiDemand/1.0'} });
      const data = await res.json();
      if (data && data[0]) {
        cache[z.id] = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      }
    } catch(e) { /* skip */ }
    i++;
    badge.textContent = `📡 ${i}/${missing.length}`;
    await new Promise(r => setTimeout(r, 1100)); // Nominatim: max 1 req/sec
  }

  // Save cache
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), coords: cache })); } catch(e){}

  badge.textContent = origText;
  applyGeoCache(cache, zMap);
}

function applyGeoCache(cache, zMap) {
  let updated = 0;
  for (const [id, coords] of Object.entries(cache)) {
    if (zMap[id] && coords) {
      zMap[id].lat = coords.lat;
      zMap[id].lng = coords.lng;
      updated++;
    }
  }
  if (updated > 0) {
    // Rebuild circles with corrected coords
    for (const [id, circle] of Object.entries(circleMap)) {
      const z = zMap[id];
      if (z) circle.setLatLng([z.lat, z.lng]);
    }
    render(currentHour);
  }
}

// ── КАРЪК MODE ──
// Типове зони където ЗЛАТНИТЕ ПАРТНЬОРИ не отиват
const KARYK_PREFER = ['hospital','university','residential','residential_lux','leisure'];
const KARYK_AVOID  = ['airport','mall','hotel','office']; // тълпят се там

let karykMode = false;

const karykBtn    = document.getElementById('karyk-btn');
const karykBanner = document.getElementById('karyk-banner');
const karykHint   = document.getElementById('karyk-hint');

karykBtn.addEventListener('click', ()=>{
  karykMode = !karykMode;
  karykBtn.classList.toggle('active', karykMode);
  karykBanner.style.display = karykMode ? 'block' : 'none';
  if(karykMode) updateKarykMode();
  render(currentHour);
});

function updateKarykMode(){
  if(!karykMode) return;
  const {scores} = computeScores(currentHour);

  // Find best "hidden gem" zone — good score but avoided type
  const gems = ZONES
    .filter(z => KARYK_PREFER.includes(z.type))
    .map(z => ({ z, s: scores[z.id]||0 }))
    .filter(({s}) => s >= 0.8)
    .sort((a,b) => b.s - a.s);

  // Find worst crowded zones to avoid
  const crowded = ZONES
    .filter(z => KARYK_AVOID.includes(z.type))
    .map(z => ({ z, s: scores[z.id]||0 }))
    .sort((a,b) => b.s - a.s)
    .slice(0,3)
    .map(({z}) => z.name.split('(')[0].trim());

  if(gems.length > 0){
    const top = gems[0];
    const c   = demandColor(top.s, top.z.type);
    karykHint.innerHTML =
      `Иди при <span style="color:${c.fill}">${top.z.icon} ${top.z.name.split('(')[0].trim()}</span> (${top.s.toFixed(1)}) ` +
      `· Избягвай: ${crowded.join(', ')}`;
  } else {
    karykHint.textContent = 'Всички тихи зони са слаби в момента…';
  }
}

// Override circle colors in Karyk mode — dim crowded, highlight hidden gems
const _origGetScoreColor = getScoreColor;
function getScoreColor(score, type){
  if(!karykMode) return _origGetScoreColor(score, type);
  if(KARYK_AVOID.includes(type)){
    // Dim the tълпа zones
    return { color:'#1a1030', fillColor:'#1a1030', fillOpacity:0.2, weight:1, opacity:0.3 };
  }
  if(KARYK_PREFER.includes(type)){
    // Boost visual of hidden gem zones
    const c = _origGetScoreColor(score, type);
    return { ...c, fillOpacity: Math.min(0.85, (c.fillOpacity||0.4) * 1.6), weight:2.5 };
  }
  return _origGetScoreColor(score, type);
}

// ── Автоматично следване на часа от устройството ──
let autoTime = true; // false когато потребителят мести slider-а ръчно

function syncToDeviceTime(){
  if(!autoTime) return;
  const h = new Date().getHours() + new Date().getMinutes()/60;
  const snapped = Math.round(h * 2) / 2; // snap to 0.5h
  if(Math.abs(snapped - currentHour) >= 0.25){
    currentHour = snapped;
    slider.value = snapped;
    document.getElementById('time-display').textContent = fmtHour(snapped);
    render(snapped);
  }
}

// Обновява се всяка минута
setInterval(syncToDeviceTime, 60000);

// При ръчно местене на slider-а — спира auto за 10 минути
slider.addEventListener('input', ()=>{
  autoTime = false;
  clearTimeout(slider._autoResume);
  slider._autoResume = setTimeout(()=>{ autoTime = true; }, 10 * 60000);
});
