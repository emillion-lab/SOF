<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Taxi Demand Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg:      #070d1a;
  --surface: #0d1929;
  --border:  #182d47;
  --amber:   #f59e0b;
  --cyan:    #00e5ff;
  --green:   #22c55e;
  --red:     #ef4444;
  --orange:  #f97316;
  --muted:   #4a6080;
  --text:    #c8daf0;
  --mono:    'Share Tech Mono', monospace;
  --sans:    'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow-x: hidden; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 { font-family: var(--mono); font-size: 15px; color: var(--cyan); letter-spacing: 2px; }
.header p  { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.live-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
#airport-badge { font-family: var(--mono); font-size: 10px; color: var(--amber); }

/* ── TIMELINE PANEL ── */
.timeline-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px 8px;
  flex-shrink: 0;
}
.tl-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
.tl-clock { font-family: var(--mono); font-size: 20px; color: var(--cyan); }
.tl-sub   { font-size: 10px; color: var(--muted); }

/* Demand sparkline canvas */
#demand-canvas { width: 100%; height: 44px; display: block; cursor: pointer; }

/* Slider overlaid on sparkline */
.tl-slider-wrap { position: relative; margin-top: -6px; }
input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 4px; background: transparent; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--cyan); border: 2px solid var(--bg);
  box-shadow: 0 0 6px rgba(0,229,255,.7); cursor: pointer;
}
.tl-ticks { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

/* ── TICKER ── */
.ticker-bar {
  background: #06101c; border-bottom: 1px solid var(--border);
  padding: 0 14px; height: 30px; overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center;
}
.ticker-wrap { display: flex; gap: 32px; animation: ticker 40s linear infinite; width: max-content; white-space: nowrap; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.tick-item { font-family: var(--mono); font-size: 10px; }
.tick-item .ev-time { color: var(--amber); }
.tick-item .ev-loc  { color: var(--muted); }

/* ── MAIN LAYOUT ── */
.main { display: flex; flex: 1; flex-direction: column; min-height: 0; }
@media(min-width:680px) { .main { flex-direction: row; } }

/* ── MAP ── */
.map-panel { flex: 1; position: relative; background: #08111f; min-height: 320px; }
#svg-map { width: 100%; height: 100%; display: block; }

/* ── TOOLTIP (bottom-anchored, never off-screen) ── */
.tooltip {
  position: absolute; display: none;
  background: #0a172aee; border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 13px;
  font-size: 11px; color: var(--text); z-index: 200;
  pointer-events: none; max-width: 200px; min-width: 150px;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.tooltip strong { font-family: var(--mono); color: var(--cyan); font-size: 12px; display: block; margin-bottom: 5px; }
.tt-score { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.tt-bar   { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.tt-fill  { height: 100%; border-radius: 2px; }
.tt-ev    { font-size: 9px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

/* ── AIRPORT CALLOUT (pinned on map) ── */
#airport-callout {
  position: absolute; right: 8px; top: 8px;
  background: #0a172af0; border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px;
  font-family: var(--mono); font-size: 10px;
  z-index: 50; pointer-events: none; min-width: 130px;
}
#airport-callout .ac-title { color: var(--cyan); font-size: 11px; margin-bottom: 3px; }
#airport-callout .ac-score { font-size: 18px; font-weight: bold; }
#airport-callout .ac-ev    { color: var(--muted); font-size: 9px; margin-top: 2px; line-height: 1.4; }

/* ── SIDEBAR ── */
.sidebar {
  width: 100%; background: var(--surface);
  border-top: 1px solid var(--border);
  overflow-y: auto; max-height: 38vh;
}
@media(min-width:680px) {
  .sidebar { width: 260px; border-top: none; border-left: 1px solid var(--border); max-height: none; }
}
.sidebar-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--muted); padding: 10px 12px 6px; text-transform: uppercase; }
.zone-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border-bottom: 1px solid #0e1d30;
  cursor: pointer; transition: background .12s;
}
.zone-item:hover { background: #111e30; }
.zone-item.active { background: #0c1f38; border-left: 2px solid var(--cyan); }
.zone-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.zone-name { font-size: 11px; flex: 1; line-height: 1.3; }
.zone-sub  { font-size: 9px; color: var(--muted); }
.zone-score{ font-family: var(--mono); font-size: 13px; font-weight: bold; }

/* ── LEGEND ── */
.legend {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 7px 14px;
  background: #06101c; border-top: 1px solid var(--border);
  font-size: 9px; color: var(--muted); flex-shrink: 0;
}
.leg { display: flex; align-items: center; gap: 4px; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

  { zone:"bus_south",       name:"Нощни автобуси изход",   endHour:22,   boost:1.5, repeat:"daily" },
  { zone:"bus_pod",         name:"Автогара Подуяне",       endHour:18,   boost:1.6, repeat:"daily" },

  // ── Офиси ──
  { zone:"mladost",  name:"Business Park – край работа",  endHour:19,   boost:2.5, repeat:"mon-fri" },
  { zone:"iztok",    name:"Офис зона Изток – изход",      endHour:18.5, boost:1.6, repeat:"mon-fri" },
  { zone:"center",   name:"Офиси Център – изход",         endHour:18,   boost:1.8, repeat:"mon-fri" },
];

// ════════════════════════════════════════════════
//  BASE demand per zone
// ════════════════════════════════════════════════
const BASE = {
  hotels: 0.9, center: 1.2, ndk: 0.8, arena: 0.3,
  serdika: 0.9, paradise: 0.8, mall_sofia: 0.7,
  central_station: 1.0, bus_south: 0.8, bus_pod: 0.6,
  mladost: 0.9, lozenets: 0.6, vitosha: 0.5,
  krasno: 0.6, iztok: 0.7, airport: 1.4,
};

// ════════════════════════════════════════════════
//  COLOR MAPPING
// ════════════════════════════════════════════════
function demandColor(score) {
  if (score >= 3.2) return { fill:"#ef4444", stroke:"#ff7777", label:"ПИК 🔥" };
  if (score >= 2.4) return { fill:"#f97316", stroke:"#ffaa55", label:"Висок ▲" };
  if (score >= 1.6) return { fill:"#f59e0b", stroke:"#ffd060", label:"Среден" };
  if (score >= 0.8) return { fill:"#22c55e", stroke:"#55ee88", label:"Нормален" };
  return { fill:"#1a3050", stroke:"#2a4870", label:"Тих" };
}

// ════════════════════════════════════════════════
//  DAY MATCHING
// ════════════════════════════════════════════════
const TODAY    = new Date();
const todayStr = TODAY.toISOString().slice(0,10);
const todayDay = TODAY.getDay();

function dayMatches(ev) {
  if (ev.date && ev.date !== todayStr) return false;
  if (ev.endDate && todayStr > ev.endDate) return false;
  if (ev.repeat === "daily")   return true;
  if (ev.repeat === "mon-fri") return todayDay >= 1 && todayDay <= 5;
  if (ev.repeat === "thu-sat") return [4,5,6].includes(todayDay);
  if (ev.repeat === "fri-sat") return [5,6].includes(todayDay);
  if (ev.repeat === "tue-sat") return todayDay >= 2 && todayDay <= 6;
  return true;
}

// ════════════════════════════════════════════════
//  SCORE COMPUTATION
// ════════════════════════════════════════════════
function computeScores(hour) {
  const scores = {}, activeEvents = {};
  for (const zid in ZONES) { scores[zid] = BASE[zid] || 0.5; activeEvents[zid] = []; }

  for (const ev of EVENTS) {
    if (!dayMatches(ev)) continue;
    const diff = hour - ev.endHour;
    let factor = 0;
    if (diff >= -0.75 && diff <= 0)  factor = (diff + 0.75) / 0.75;
    else if (diff > 0 && diff <= 1.5) factor = 1 - diff / 1.5;
    if (factor > 0.05) {
      scores[ev.zone] += ev.boost * factor;
      activeEvents[ev.zone].push({ name: ev.name, factor });
    }
  }
  return { scores, activeEvents };
}

// Total demand across all zones at a given hour (for sparkline)
function totalDemand(hour) {
  const { scores } = computeScores(hour);
  return Object.values(scores).reduce((a, b) => a + b, 0);
}

// ════════════════════════════════════════════════
//  SPARKLINE / DEMAND TIMELINE
// ════════════════════════════════════════════════
const canvas  = document.getElementById('demand-canvas');
const ctx     = canvas.getContext('2d');
const MIN_H   = 14, MAX_H = 24;
const STEPS   = 40; // resolution

let demandCurve = [];

function buildCurve() {
  demandCurve = [];
  for (let i = 0; i <= STEPS; i++) {
    const h = MIN_H + (i / STEPS) * (MAX_H - MIN_H);
    demandCurve.push(totalDemand(h));
  }
}

function drawSparkline(currentH) {
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth;
  const H   = canvas.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  const maxD = Math.max(...demandCurve);
  const minD = Math.min(...demandCurve) * 0.8;

  const xOf = i => (i / STEPS) * W;
  const yOf = v => H - 4 - ((v - minD) / (maxD - minD)) * (H - 10);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   'rgba(239,68,68,0.35)');
  grad.addColorStop(0.5, 'rgba(245,158,11,0.2)');
  grad.addColorStop(1,   'rgba(34,197,94,0.05)');

  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(demandCurve[0]));
  for (let i = 1; i <= STEPS; i++) ctx.lineTo(xOf(i), yOf(demandCurve[i]));
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(demandCurve[0]));
  for (let i = 1; i <= STEPS; i++) ctx.lineTo(xOf(i), yOf(demandCurve[i]));
  ctx.strokeStyle = '#f59e0b88'; ctx.lineWidth = 1.5; ctx.stroke();

  // Current position line
  const cx = ((currentH - MIN_H) / (MAX_H - MIN_H)) * W;
  ctx.beginPath();
  ctx.moveTo(cx, 0); ctx.lineTo(cx, H);
  ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1.5; ctx.setLineDash([3,3]); ctx.stroke();
  ctx.setLineDash([]);

  // Dot on curve
  const ci = Math.round(((currentH - MIN_H) / (MAX_H - MIN_H)) * STEPS);
  const cv = demandCurve[Math.min(ci, STEPS)];
  const cy = yOf(cv);
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#00e5ff'; ctx.fill();
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
const shapes   = document.querySelectorAll('.zone-shape');
const slider   = document.getElementById('time-slider');
const zoneList = document.getElementById('zone-list');
const tooltip  = document.getElementById('tooltip');
const mapPanel = document.getElementById('map-panel');

let currentHour   = parseFloat(slider.value);
let selectedZone  = null;

function fmtHour(h) {
  const hh = Math.floor(h);
  const mm = h % 1 === 0 ? '00' : h % 1 === 0.5 ? '30' : '00';
  return `${String(hh).padStart(2,'0')}:${mm}`;
}

function updateAirportCallout(scores, activeEvents) {
  const s  = scores['airport'] || 0;
  const c  = demandColor(s);
  const ev = activeEvents['airport'] || [];
  document.getElementById('ac-score').textContent = s.toFixed(1);
  document.getElementById('ac-score').style.color = c.fill;
  const evText = ev.length
    ? ev.slice(0,2).map(e => e.name.replace(/^✈ /,'')).join('\n')
    : 'Базово търсене';
  document.getElementById('ac-ev').textContent = evText;
}

function updateTimeHint(scores) {
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const top = sorted[0];
  const z = ZONES[top[0]];
  document.getElementById('tl-hint').textContent =
    `Топ: ${z.icon} ${z.name} (${top[1].toFixed(1)})`;
}

function render(hour) {
  const { scores, activeEvents } = computeScores(hour);

  // Map zones
  shapes.forEach(el => {
    const zid = el.dataset.zone;
    const s = scores[zid] || 0;
    const c = demandColor(s);
    el.style.fill        = c.fill + 'bb';
    el.style.stroke      = c.stroke;
    el.style.strokeWidth = selectedZone === zid ? '2.5' : '1';
    el.style.filter      = zid === 'airport' ? `drop-shadow(0 0 6px ${c.fill})` : '';
    el.style.opacity     = selectedZone && selectedZone !== zid ? '0.55' : '1';
  });

  updateAirportCallout(scores, activeEvents);
  updateTimeHint(scores);

  // Sparkline
  drawSparkline(hour);

  // Sidebar
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  zoneList.innerHTML = sorted.map(([zid, score]) => {
    const z  = ZONES[zid];
    const c  = demandColor(score);
    const ev = (activeEvents[zid] || []);
    const sub = ev.length ? ev[0].name : '';
    return `<div class="zone-item ${selectedZone===zid?'active':''}" onclick="selectZone('${zid}')">
      <div class="zone-dot" style="background:${c.fill}"></div>
      <div style="flex:1;min-width:0">
        <div class="zone-name">${z.icon} ${z.name}</div>
        ${sub ? `<div class="zone-sub">${sub}</div>` : ''}
      </div>
      <div class="zone-score" style="color:${c.fill}">${score.toFixed(1)}</div>
    </div>`;
  }).join('');
}

function selectZone(zid) {
  selectedZone = selectedZone === zid ? null : zid;
  render(currentHour);
}
window.selectZone = selectZone;

// ── Tooltip (smart positioning inside map panel) ──
shapes.forEach(el => {
  el.addEventListener('mouseenter', e => showTooltip(e, el.dataset.zone));
  el.addEventListener('mousemove',  e => moveTooltip(e));
  el.addEventListener('mouseleave', ()  => { tooltip.style.display = 'none'; });
  el.addEventListener('click',      ()  => selectZone(el.dataset.zone));
  // Touch
  el.addEventListener('touchstart', e => { e.preventDefault(); selectZone(el.dataset.zone); }, {passive:false});
});

function showTooltip(e, zid) {
  if (zid === 'airport') { tooltip.style.display = 'none'; return; } // airport has its own callout
  const { scores, activeEvents } = computeScores(currentHour);
  const z   = ZONES[zid];
  const s   = scores[zid];
  const c   = demandColor(s);
  const evs = activeEvents[zid] || [];
  const pct = Math.min(100, (s / 4.5) * 100);
  tooltip.innerHTML = `
    <strong>${z.icon} ${z.name}</strong>
    <div class="tt-score">
      <span style="font-size:10px;color:${c.fill};font-family:var(--mono)">${c.label}</span>
      <div class="tt-bar"><div class="tt-fill" style="width:${pct}%;background:${c.fill}"></div></div>
      <span style="font-family:var(--mono);font-size:12px;color:${c.fill}">${s.toFixed(1)}</span>
    </div>
    ${evs.length ? '<div class="tt-ev">' + evs.slice(0,2).map(ev=>`• ${ev.name}`).join('<br>') + '</div>' : ''}`;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const rect = mapPanel.getBoundingClientRect();
  let x = e.clientX - rect.left + 12;
  let y = e.clientY - rect.top  + 12;
  // Keep inside panel
  const tw = tooltip.offsetWidth  || 180;
  const th = tooltip.offsetHeight || 80;
  if (x + tw > rect.width  - 10) x = e.clientX - rect.left - tw - 8;
  if (y + th > rect.height - 10) y = e.clientY - rect.top  - th - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

// ── Slider ──
slider.addEventListener('input', () => {
  currentHour = parseFloat(slider.value);
  document.getElementById('time-display').textContent = fmtHour(currentHour);
  render(currentHour);
});

// ════════════════════════════════════════════════
//  TICKER
// ════════════════════════════════════════════════
function buildTicker() {
  const items = EVENTS.filter(dayMatches).sort((a,b) => a.endHour - b.endHour)
    .map(ev => `<span class="tick-item">
      <span class="ev-time">${fmtHour(ev.endHour)}</span>
      <span> ${ev.name} </span>
      <span class="ev-loc">@ ${ZONES[ev.zone]?.name||ev.zone}</span>
      <span style="color:#0f2040"> ······ </span>
    </span>`);
  const html = items.join('') + items.join('');
  const el = document.getElementById('ticker');
  el.innerHTML = html;
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
}

// ════════════════════════════════════════════════
//  AIRPORT — flight-cache.json integration
// ════════════════════════════════════════════════
let flightHours  = Array(24).fill(0);
let airportStatus = 'offline';

function injectAirportEvents() {
  const keep = EVENTS.filter(e => !e._fromFlight);
  for (let h = 0; h < 24; h++) {
    const count = flightHours[h];
    if (count === 0) continue;
    const boost = Math.min(3.8, count * 0.42);
    keep.push({
      zone:'airport',
      name:`✈ ${count} рейс${count===1?'':'а'} ~${String(h).padStart(2,'0')}:00`,
      endHour: h + 0.25,
      boost, repeat:'daily', _fromFlight:true,
    });
  }
  EVENTS.length = 0;
  keep.forEach(e => EVENTS.push(e));
}

function updateAirportBadge() {
  const b = document.getElementById('airport-badge');
  if (airportStatus === 'live')     { b.textContent = '✈ LIVE';       b.style.color = '#22c55e'; }
  else if (airportStatus === 'fallback') { b.textContent = '✈ ПРОГНОЗА'; b.style.color = '#f59e0b'; }
  else                              { b.textContent = '✈ ОФЛАЙН';    b.style.color = '#ef4444'; }
}

function applyFallbackAirport() {
  airportStatus = 'fallback';
  [
    [7,3],[9,5],[11,4],[13,3],[15,4],[16,6],
    [18,7],[19,8],[20,6],[21,5],[22,4],[23,3]
  ].forEach(([h,c]) => { flightHours[h] = c; });
  injectAirportEvents();
}

function loadFlights() {
  fetch('flight-cache.json')
    .then(r => { if (!r.ok) throw 0; return r.json(); })
    .then(data => {
      const flights = data.data || [];
      if (!flights.length) throw 0;
      flightHours = Array(24).fill(0);
      flights.forEach(f => {
        if (!f.arrival?.scheduled) return;
        const t      = new Date(f.arrival.estimated || f.arrival.scheduled);
        const nonEU  = (f.departure?.airport||'').toLowerCase().match(/tur|israel|uk/);
        const ready  = new Date(t.getTime() + (nonEU ? 20 : 10) * 60000);
        flightHours[ready.getHours()]++;
      });
      airportStatus = 'live';
      injectAirportEvents();
      updateAirportBadge();
      buildCurve(); buildTicker(); render(currentHour);
    })
    .catch(() => {
      applyFallbackAirport();
      updateAirportBadge();
      buildCurve(); buildTicker(); render(currentHour);
    });
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
const nowH    = new Date().getHours() + new Date().getMinutes() / 60;
const clamped = Math.min(24, Math.max(14, Math.round(nowH * 2) / 2)); // snap to 0.5h
slider.value  = clamped;
currentHour   = clamped;
document.getElementById('time-display').textContent = fmtHour(clamped);

applyFallbackAirport();
buildCurve();
buildTicker();
render(currentHour);
loadFlights(); // async override if JSON present

window.addEventListener('resize', () => drawSparkline(currentHour));
</script>
</body>
