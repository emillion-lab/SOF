<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>SOF Taxi Radar</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:#fff;
  padding:15px;
}

h2{margin-bottom:5px}

.bar{
  display:flex;
  height:20px;
  border-radius:4px;
  overflow:hidden;
}

.cell{
  flex:1;
  font-size:10px;
  text-align:center;
  line-height:20px;
}

.red{ background:#ef4444; }
.orange{ background:#f59e0b; }
.green{ background:#22c55e; }
.gray{ background:#374151; }

.block{
  background:#111827;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.big{
  font-size:28px;
  font-weight:bold;
}

.good{color:#22c55e}
.warn{color:#f59e0b}
.bad{color:#ef4444}

</style>
</head>

<body>

<h2>✈️ Airport Heatmap (деня)</h2>

<div id="heat"></div>

<div class="block">
<div>Сега:</div>
<div id="status" class="big">...</div>
<div id="hint"></div>
</div>

<div class="block">
<h3>Следващи силни моменти</h3>
<div id="next"></div>
</div>

<script>

fetch('flight-cache.json')
.then(r=>r.json())
.then(data=>{

let flights = data.data || [];

let hours = Array(24).fill(0);

let now = new Date();

flights.forEach(f=>{
    if(!f.arrival || !f.arrival.scheduled) return;

    let t = new Date(f.arrival.estimated || f.arrival.scheduled);

    let country = (f.departure?.airport || "").toLowerCase();

    let nonEU = country.includes("tur") || country.includes("israel") || country.includes("uk");

    let delay = nonEU?20:10;

    let ready = new Date(t.getTime() + delay*60000);

    let h = ready.getHours();

    hours[h]++;
});


// score per hour
let score = hours.map(v=>{
    if(v>=8) return 3;
    if(v>=4) return 2;
    if(v>=2) return 1;
    return 0;
});


// render heatmap
let html='<div class="bar">';

score.forEach((s,i)=>{
    let cls="gray";

    if(s==3) cls="red";
    else if(s==2) cls="orange";
    else if(s==1) cls="green";

    html+=`<div class="cell ${cls}" title="${i}:00">${i}</div>`;
});

html+='</div>';

document.getElementById("heat").innerHTML=html;


// NOW status
let currentHour = now.getHours();
let s = score[currentHour];

let txt="Спокойно";
let cls="bad";
let hint="Не си губи времето";

if(s==1){ txt="Става"; cls="warn"; hint="Можеш да пробваш"; }
if(s>=2){ txt="Добро време"; cls="good"; hint="ВЛЕЗ СЕГА"; }

// extra: ако пик след 1 час
if(score[currentHour+1]>=2){
    hint="Изчакай ~1 час";
}

document.getElementById("status").innerHTML =
`<span class="${cls}">${txt}</span>`;

document.getElementById("hint").innerHTML = hint;


// next best windows
let nextHTML="";

score.forEach((v,i)=>{
    if(v>=2){
        nextHTML += `
        <div>
        ${i}:00 - ${(i+1)}:00 → ${v>=3?"🔥 силно":"средно"}
        </div>`;
    }
});

document.getElementById("next").innerHTML=nextHTML || "Няма силни моменти";


});

</script>

</body>
</html>
