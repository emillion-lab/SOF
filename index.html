<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sofia Taxi Demand</title>
<style>
/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }
.leaflet-tooltip-pane   { z-index: 650; }
.leaflet-popup-pane   { z-index: 700; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {
	visibility: hidden;
	}


/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {
	cursor: -webkit-grab;
	cursor:    -moz-grab;
	cursor:         grab;
	}
.leaflet-crosshair,
.leaflet-crosshair .leaflet-interactive {
	cursor: crosshair;
	}
.leaflet-popup-pane,
.leaflet-control {
	cursor: auto;
	}
.leaflet-dragging .leaflet-grab,
.leaflet-dragging .leaflet-grab .leaflet-interactive,
.leaflet-dragging .leaflet-marker-draggable {
	cursor: move;
	cursor: -webkit-grabbing;
	cursor:    -moz-grabbing;
	cursor:         grabbing;
	}

/* marker & overlays interactivity */
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-image-layer,
.leaflet-pane > svg path,
.leaflet-tile-container {
	pointer-events: none;
	}

.leaflet-marker-icon.leaflet-interactive,
.leaflet-image-layer.leaflet-interactive,
.leaflet-pane > svg path.leaflet-interactive,
svg.leaflet-image-layer.leaflet-interactive path {
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}

/* visual tweaks */

.leaflet-container {
	background: #ddd;
	outline-offset: 1px;
	}
.leaflet-container a {
	color: #0078A8;
	}
.leaflet-zoom-box {
	border: 2px dotted #38f;
	background: rgba(255,255,255,0.5);
	}


/* general typography */
.leaflet-container {
	font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
	font-size: 12px;
	font-size: 0.75rem;
	line-height: 1.5;
	}


/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;
	border-bottom: 1px solid #ccc;
	width: 26px;
	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;
	text-decoration: none;
	color: black;
	}
.leaflet-bar a,
.leaflet-control-layers-toggle {
	background-position: 50% 50%;
	background-repeat: no-repeat;
	display: block;
	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;
	border-top-right-radius: 4px;
	}
.leaflet-bar a:last-child {
	border-bottom-left-radius: 4px;
	border-bottom-right-radius: 4px;
	border-bottom: none;
	}
.leaflet-bar a.leaflet-disabled {
	cursor: default;
	background-color: #f4f4f4;
	color: #bbb;
	}

.leaflet-touch .leaflet-bar a {
	width: 30px;
	height: 30px;
	line-height: 30px;
	}
.leaflet-touch .leaflet-bar a:first-child {
	border-top-left-radius: 2px;
	border-top-right-radius: 2px;
	}
.leaflet-touch .leaflet-bar a:last-child {
	border-bottom-left-radius: 2px;
	border-bottom-right-radius: 2px;
	}

/* zoom control */

.leaflet-control-zoom-in,
.leaflet-control-zoom-out {
	font: bold 18px 'Lucida Console', Monaco, monospace;
	text-indent: 1px;
	}

.leaflet-touch .leaflet-control-zoom-in, .leaflet-touch .leaflet-control-zoom-out  {
	font-size: 22px;
	}


/* layers control */

.leaflet-control-layers {
	box-shadow: 0 1px 5px rgba(0,0,0,0.4);
	background: #fff;
	border-radius: 5px;
	}
.leaflet-control-layers-toggle {
	background-image: url(images/layers.png);
	width: 36px;
	height: 36px;
	}
.leaflet-retina .leaflet-control-layers-toggle {
	background-image: url(images/layers-2x.png);
	background-size: 26px 26px;
	}
.leaflet-touch .leaflet-control-layers-toggle {
	width: 44px;
	height: 44px;
	}
.leaflet-control-layers .leaflet-control-layers-list,
.leaflet-control-layers-expanded .leaflet-control-layers-toggle {
	display: none;
	}
.leaflet-control-layers-expanded .leaflet-control-layers-list {
	display: block;
	position: relative;
	}
.leaflet-control-layers-expanded {
	padding: 6px 10px 6px 6px;

	}
.leaflet-control-layers-scrollbar {
	overflow-y: scroll;

	}
.leaflet-control-layers-selector {
	margin-top: 2px;

	top: 1px;
	}
.leaflet-control-layers label {
	display: block;
	font-size: 13px;
	font-size: 1.08333em;
	}
.leaflet-control-layers-separator {
	height: 0;
	border-top: 1px solid #ddd;
	margin: 5px -10px 5px -6px;
	}

/* Default icon URLs */
.leaflet-default-icon-path { /* used only in path-guessing heuristic, see L.Icon.Default */
	background-image: url(images/marker-icon.png);
	}


/* attribution and scale controls */

.leaflet-container .leaflet-control-attribution {
	background: #fff;
	background: rgba(255, 255, 255, 0.8);

	}
.leaflet-control-attribution,
.leaflet-control-scale-line {
	padding: 0 5px;

.leaflet-control-attribution a {

.leaflet-attribution-flag {
	display: inline !important;

	width: 1em;

	}
.leaflet-left .leaflet-control-scale {
	margin-left: 5px;

.leaflet-bottom .leaflet-control-scale {
	margin-bottom: 5px;
	}
.leaflet-control-scale-line {
	border: 2px solid #777;
	border-top: none;
	line-height: 1.1;
	padding: 2px 5px 1px;
	white-space: nowrap;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	background: rgba(255, 255, 255, 0.8);
	text-shadow: 1px 1px #fff;
	}
.leaflet-control-scale-line:not(:first-child) {
	border-top: 2px solid #777;
	border-bottom: none;
	margin-top: -2px;
	}
.leaflet-control-scale-line:not(:first-child):not(:last-child) {
	border-bottom: 2px solid #777;
	}

.leaflet-touch .leaflet-control-attribution,
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	box-shadow: none;
	}
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	border: 2px solid rgba(0,0,0,0.2);
	background-clip: padding-box;
	}


/* popup */

.leaflet-popup {
	position: absolute;
	text-align: center;
	margin-bottom: 20px;
	}
.leaflet-popup-content-wrapper {
	padding: 1px;

	}
.leaflet-popup-content {
	margin: 13px 24px 13px 20px;

	}
.leaflet-popup-content p {

	}
.leaflet-popup-tip-container {

	}
.leaflet-popup-tip {
	width: 17px;
	height: 17px;
	padding: 1px;

	margin: -10px auto 0;

	-webkit-transform: rotate(45deg);
	   -moz-transform: rotate(45deg);
	    -ms-transform: rotate(45deg);
	        transform: rotate(45deg);
	}
.leaflet-popup-content-wrapper,
.leaflet-popup-tip {
	background: white;

	}
.leaflet-container a.leaflet-popup-close-button {

.leaflet-container a.leaflet-popup-close-button:hover,
.leaflet-container a.leaflet-popup-close-button:focus {

.leaflet-popup-scrolled {

.leaflet-oldie .leaflet-popup-content-wrapper {

	}
.leaflet-oldie .leaflet-popup-tip {
	width: 24px;
	margin: 0 auto;

	-ms-filter: "progid:DXImageTransform.Microsoft.Matrix(M11=0.70710678, M12=0.70710678, M21=-0.70710678, M22=0.70710678)";
	filter: progid:DXImageTransform.Microsoft.Matrix(M11=0.70710678, M12=0.70710678, M21=-0.70710678, M22=0.70710678);

.leaflet-oldie .leaflet-control-zoom,
.leaflet-oldie .leaflet-control-layers,
.leaflet-oldie .leaflet-popup-content-wrapper,

/* div icon */

.leaflet-div-icon {
	background: #fff;

/* Tooltip */
/* Base styles for the element that has a tooltip */
.leaflet-tooltip {
	position: absolute;
	padding: 6px;
	background-color: #fff;
	border: 1px solid #fff;
	border-radius: 3px;
	color: #222;

.leaflet-tooltip.leaflet-interactive {

.leaflet-tooltip-top:before,
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	position: absolute;
	pointer-events: none;
	border: 6px solid transparent;
	background: transparent;
	content: "";
	}

/* Directions */

.leaflet-tooltip-bottom {
	margin-top: 6px;
}
.leaflet-tooltip-top {
	margin-top: -6px;
}
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-top:before {
	left: 50%;
	margin-left: -6px;
	}
.leaflet-tooltip-top:before {

	margin-bottom: -12px;

	top: 0;

	margin-left: -6px;
}
.leaflet-tooltip-right {
	margin-left: 6px;
}
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	top: 50%;
	margin-top: -6px;
	}

	margin-right: -12px;

.leaflet-tooltip-right:before {
	left: 0;

		-webkit-print-color-adjust: exact;

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap');
:root {
  --bg:#070d1a; --surface:#0d1929; --border:#182d47;
  --amber:#f59e0b; --cyan:#00e5ff; --green:#22c55e;
  --red:#ef4444; --orange:#f97316; --muted:#4a6080; --text:#c8daf0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* HEADER */
.header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000;}
.header h1{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);letter-spacing:2px;}
.header p{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#airport-badge{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--amber);}

/* TIMELINE */
.timeline-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 12px 5px;flex-shrink:0;}
.tl-top{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.tl-clock{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--cyan);}
.tl-sub{font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-dead{font-size:9px;color:var(--red);font-family:'Share Tech Mono',monospace;display:none;}
#demand-canvas{width:100%;height:40px;display:block;cursor:pointer;min-height:40px;}
.tl-slider-wrap{margin-top:-4px;}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:transparent;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg);box-shadow:0 0 6px rgba(0,229,255,.7);cursor:pointer;}
.tl-ticks{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-top:1px;}

/* TICKER */
.ticker-bar{background:#06101c;border-bottom:1px solid var(--border);padding:0 12px;height:30px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;}
.ticker-wrap{display:flex;gap:50px;animation:ticker 140s linear infinite;width:max-content;white-space:nowrap;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{font-family:'Share Tech Mono',monospace;font-size:12px;}
.tick-item .ev-time{color:var(--amber);}
.tick-item .ev-loc{color:var(--muted);}

/* MAP — фиксирана височина вместо flex:1 за да се рендира правилно */
#map{
  height: calc(100vh - 200px);
  min-height: 280px;
  z-index:1;
  background:#08111f;
}

/* NAV PANEL (bottom sheet) */
#nav-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:#0a172af5;border-top:1px solid var(--border);
  padding:10px 14px;z-index:2000;
  display:none;flex-direction:column;gap:6px;
  backdrop-filter:blur(6px);
}
#nav-panel.open{display:flex;}
.nav-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);}
.nav-target{font-size:13px;font-weight:600;}
.nav-distance{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);}
.nav-row{display:flex;gap:8px;align-items:center;}
#nav-compass{font-size:28px;transition:transform .4s;}
.nav-hint{font-size:11px;color:var(--text);}
.nav-close{margin-left:auto;font-size:18px;cursor:pointer;color:var(--muted);padding:0 4px;}
.nav-score{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:bold;}

/* GPS button */
#gps-btn{
  position:fixed;right:12px;bottom:70px;z-index:1500;
  width:44px;height:44px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  color:var(--cyan);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
#gps-btn.active{background:#0d2a1a;border-color:var(--green);color:var(--green);}

/* Legend */
#legend{
  position:fixed;left:8px;bottom:70px;z-index:1500;
  background:#0a172af0;border:1px solid var(--border);border-radius:6px;
  padding:6px 8px;font-size:9px;color:var(--muted);
}
.leg{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.leg:last-child{margin-bottom:0;}
.leg-sq{width:10px;height:10px;border-radius:2px;opacity:.75;}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{background:#0d1929;border:1px solid var(--border);border-radius:8px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.5);}
.leaflet-popup-tip{background:#0d1929;}
.leaflet-popup-content{margin:10px 12px;font-family:'Inter',sans-serif;font-size:12px;min-width:160px;}
.popup-title{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);margin-bottom:5px;}
.popup-score{font-size:20px;font-weight:bold;margin-bottom:3px;}
.popup-ev{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.popup-nav-btn{background:var(--cyan);color:#000;border:none;border-radius:4px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;width:100%;font-family:'Share Tech Mono',monospace;}
.popup-nav-btn:hover{background:#00c8e0;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📍 SOFIA TAXI DEMAND</h1>
    <p>Реална карта · GPS навигация</p>
  </div>
  <div class="hdr-right">
    <span id="airport-badge">✈ ЗАРЕЖДА…</span>
    <div class="live-dot"></div>
  </div>
</div>

<div class="timeline-panel">
  <div class="tl-top">
    <span class="tl-clock" id="time-display">16:00</span>
    <span class="tl-sub"   id="tl-hint">—</span>
    <span class="tl-dead"  id="tl-dead">⚠ МЪРТВА ЗОНА</span>
  </div>
  <canvas id="demand-canvas"></canvas>
  <div class="tl-slider-wrap">
    <input type="range" id="time-slider" min="6" max="24" value="16" step="0.5">
  </div>
  <div class="tl-ticks">
    <span>6</span><span>8</span><span>10</span><span>12</span><span>14</span>
    <span>16</span><span>18</span><span>20</span><span>22</span><span>24</span>
  </div>
</div>

<div class="ticker-bar"><div class="ticker-wrap" id="ticker"></div></div>

<div id="map"></div>

<!-- GPS button -->
<button id="gps-btn" title="GPS локация">📍</button>

<!-- Legend -->
<div id="legend">
  <div class="leg"><div class="leg-sq" style="background:#ef4444"></div>ПИК 🔥</div>
  <div class="leg"><div class="leg-sq" style="background:#f97316"></div>Висок</div>
  <div class="leg"><div class="leg-sq" style="background:#f59e0b"></div>Среден</div>
  <div class="leg"><div class="leg-sq" style="background:#22c55e"></div>Нормален</div>
  <div class="leg"><div class="leg-sq" style="background:#1a3050;border:1px solid #2a4870"></div>Тих</div>
</div>

<!-- Navigation bottom sheet -->
<div id="nav-panel">
  <div class="nav-row">
    <div>
      <div class="nav-title">🧭 НАВИГАЦИЯ КЪМ</div>
      <div class="nav-target" id="nav-target">—</div>
      <div class="nav-distance" id="nav-dist">—</div>
    </div>
    <div class="nav-score" id="nav-score" style="margin-left:12px">—</div>
    <span class="nav-close" onclick="closeNav()">✕</span>
  </div>
  <div class="nav-row">
    <div id="nav-compass" style="font-size:32px">⬆️</div>
    <div class="nav-hint" id="nav-hint">Изчакване на GPS…</div>
  </div>
</div>
